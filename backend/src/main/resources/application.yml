server:
  port: 8080

spring:
  application:
    name: helping-hands-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:helping_hands}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USERNAME:helping_hands_user}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'validate' in real environments — schema is owned by the SQL scripts in /database,
      # not generated by Hibernate. Flip to 'update' only for local rapid prototyping.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  jackson:
    default-property-inclusion: non_null
    deserialization:
      # A stray extra field from the frontend (e.g. a client-only form field
      # accidentally left in a payload) should never hard-fail an endpoint.
      fail-on-unknown-properties: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          # Without these, an unreachable/slow SMTP server hangs the calling
          # HTTP request indefinitely (no default timeout exists) — that's
          # what caused the "Sending..." button to never resolve. 10s is
          # generous for a real SMTP handshake; a legitimate server responds
          # in well under a second.
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

mail:
  from-address: ${MAIL_FROM_ADDRESS:no-reply@helpinghands.local}

# Which EmailService bean is active:
#   "resend"   (default) — HTTPS API. Simple, but the free onboarding@resend.dev
#              sender can only email your OWN account address until you verify
#              a domain (resend.com/domains).
#   "sendgrid" — HTTPS API. Use this if you don't have a domain to verify —
#              SendGrid's Single Sender Verification (one email address, no
#              DNS) lets you email any recipient.
#   "brevo"    — HTTPS API. Same single-sender model as SendGrid; use this if
#              SendGrid's signup process itself is the blocker.
#   "smtp"     — only for self-hosted/VPS deployments (docker-compose) where
#              outbound SMTP isn't blocked at the network level, and where
#              MAIL_* below actually apply. Blocked on Render/most PaaS hosts.
app:
  email-provider: ${EMAIL_PROVIDER:resend}
  # Used to build email verification / password reset links. Must be the
  # actual deployed frontend origin (e.g. https://helping-hands.vercel.app)
  # in every environment except local dev.
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

resend:
  api-key: ${RESEND_API_KEY:}
  # IMPORTANT: onboarding@resend.dev only delivers to the email address that
  # owns your Resend account — every other recipient gets rejected with a
  # 403 ("verify a domain to send to other recipients"). Verify a real
  # domain at resend.com/domains and point this at an address on it once
  # you need to email real users. Until then, use app.email-provider=sendgrid
  # instead (below) — it supports single-address verification, no domain needed.
  from-address: ${RESEND_FROM_ADDRESS:Helping Hands <onboarding@resend.dev>}

sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  # Must be an address verified via SendGrid's "Single Sender Verification"
  # (Settings → Sender Authentication) — a one-time click-a-confirmation-link
  # step, no domain/DNS required. Unlike Resend's sandbox sender, a verified
  # single sender can email any recipient, not just your own inbox.
  from-address: ${SENDGRID_FROM_ADDRESS:}
  from-name: ${SENDGRID_FROM_NAME:Helping Hands}

brevo:
  api-key: ${BREVO_API_KEY:}
  # Same single-sender-verification model as SendGrid (Brevo dashboard ->
  # Senders, Domains & Dedicated IPs -> Senders), an alternative if
  # SendGrid's signup process itself is the blocker.
  from-address: ${BREVO_FROM_ADDRESS:}
  from-name: ${BREVO_FROM_NAME:Helping Hands}

storage:
  local:
    # WARNING: on hosts with an ephemeral filesystem (e.g. Render's free tier),
    # anything written here is wiped on every redeploy/restart. Fine for a demo;
    # swap FileStorageService for a cloud-backed implementation before real use.
    base-path: ${STORAGE_BASE_PATH:./uploads}
  # 256-bit AES key, base64-encoded. Generate with: openssl rand -base64 32
  # Every uploaded file is encrypted with this key before touching disk.
  # Losing it makes existing files permanently unreadable — treat it like a
  # database credential, not a config toggle. The fallback below is a valid
  # key so the app doesn't crash without one set, but it's PUBLIC (it's in
  # this file) — never rely on it outside local scratch testing.
  encryption-key: ${STORAGE_ENCRYPTION_KEY:WL+Cm4Prkf7eotbRePGacs4TfT+0eal+nGCIqdgjmoI=}

security:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-long-random-secret-in-every-environment}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24h
  admin-bootstrap-secret: ${ADMIN_BOOTSTRAP_SECRET:change-this-in-every-environment}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.helpinghands: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
