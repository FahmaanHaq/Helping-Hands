server:
  port: 8080

spring:
  application:
    name: helping-hands-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:helping_hands}
    username: ${DB_USERNAME:helping_hands_user}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'validate' in real environments — schema is owned by the SQL scripts in /database,
      # not generated by Hibernate. Flip to 'update' only for local rapid prototyping.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  jackson:
    default-property-inclusion: non_null

security:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-long-random-secret-in-every-environment}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24h

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.helpinghands: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
